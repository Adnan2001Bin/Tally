services:
  postgres:
    image: postgres:16-alpine
    container_name: tally-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tally
    volumes:
      - tally_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tally"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tally_postgres_data:
